<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>From Nothing to Now</title>
 <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%2312022a'/%3E%3Cg fill='none' stroke='%23c8a0ff' stroke-width='2'%3E%3Cpolygon points='32,12 54,50 10,50'/%3E%3Ccircle cx='32' cy='37' r='11'/%3E%3C/g%3E%3Ccircle cx='32' cy='37' r='3' fill='%23ffd24f'/%3E%3C/svg%3E">
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; background:#000008; overflow:hidden; font-family:Georgia,serif; user-select:none; }
  canvas { position:fixed; top:0; left:0; width:100%; height:100%; }

  /* Bottom label bar */
  #ui { position:fixed; bottom:0; left:0; right:0; padding:1.4rem 2rem 2rem; background:linear-gradient(to top,rgba(0,0,8,.93) 55%,transparent); display:flex; flex-direction:column; align-items:center; gap:.3rem; pointer-events:none; transition:opacity 1.2s ease; }
  #ctr { font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:rgba(240,237,230,.32); }
  #ttl { font-size:clamp(1rem,2.2vw,1.5rem); font-weight:normal; color:rgba(240,237,230,.9); letter-spacing:.05em; text-align:center; }
  #sub { font-size:clamp(.7rem,1.3vw,.85rem); color:rgba(240,237,230,.38); font-style:italic; letter-spacing:.06em; text-align:center; }
  #bar { position:fixed; bottom:0; left:0; height:2px; background:rgba(143,196,168,.55); transition:width .5s ease; pointer-events:none; }

  /* Intro overlay */
  #intro { position:fixed; inset:0; z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1rem; background:#000008; transition:opacity 1.2s ease; }
  #intro h1 { font-size:clamp(1.6rem,3.5vw,2.6rem); font-weight:normal; color:rgba(240,237,230,.92); letter-spacing:.06em; text-align:center; }
  #intro p { font-size:clamp(.8rem,1.4vw,.95rem); color:rgba(240,237,230,.38); font-style:italic; letter-spacing:.07em; }
  #intro .cta { margin-top:2rem; font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:rgba(143,196,168,.65); animation:blink 2s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:.4} 50%{opacity:1} }

  /* End overlay */
  #end { position:fixed; inset:0; z-index:90; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,8,.28); opacity:0; pointer-events:none; transition:opacity 1.5s ease; }
  #end.show { opacity:1; pointer-events:all; }
  #rst { background:rgba(0,0,10,.35); border:1px solid rgba(200,160,255,.55); color:rgba(235,220,255,.9); font-family:Georgia,serif; font-size:10px; letter-spacing:.18em; text-transform:uppercase; padding:.6rem 1.5rem; cursor:pointer; transition:all .3s; backdrop-filter:blur(2px); }
  #rst:hover { background:rgba(200,160,255,.18); border-color:rgba(200,160,255,.9); color:#fff; }

  @keyframes fadeIn { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">
  <div id="ctr">Scene 1 of 15</div>
  <div id="ttl">Symmetry Breaking</div>
  <div id="sub">13.8 billion years ago, the first difference</div>
</div>
<div id="bar" style="width:0%"></div>

<div id="intro">
  <h1>From Nothing to Now</h1>
  <p>13.8 billion years of self-organization</p>
  <div class="cta">click anywhere to begin</div>
</div>

<div id="end">
  <button id="rst">begin again</button>
</div>

<script>


const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
let W, H, cx, cy;
function resize(){ W=cv.width=innerWidth; H=cv.height=innerHeight; cx=W/2; cy=H/2; }
resize(); addEventListener('resize', resize);

const TAU = Math.PI*2;
const clamp = (a,b,v) => Math.max(a,Math.min(b,v));
const lerp  = (a,b,t) => a+(b-a)*t;
const ease  = t => t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
const fi    = (t,d,u) => clamp(0,1,(t-d)/u);

// Deeper, saturated jewel-tone backgrounds so bright spectrum linework pops
const bgs = ['18,2,42','26,2,52','10,4,54','48,6,40','30,6,58','8,10,60','6,20,64','10,8,66','40,6,66','54,14,30','58,20,10','48,10,44','8,30,66','10,40,70','30,10,72'];
function bg(i){
  ctx.fillStyle='rgb('+bgs[i]+')'; ctx.fillRect(0,0,W,H);
  // slow-drifting radial aurora wash for psychedelic depth
  const hb=(gT*8 + i*40)%360;
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H)*.75);
  g.addColorStop(0,`hsla(${hb},85%,55%,0.16)`);
  g.addColorStop(0.5,`hsla(${(hb+80)%360},80%,50%,0.07)`);
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
}

// ===== RAINBOW ENGINE =======================================================
let gT = 0; // global rainbow clock (seconds), always advancing
function spectrum(offset, a, light){
  const h=(gT*45 + (offset||0))%360;
  return `hsla(${h},95%,${light==null?65:light}%,${a==null?1:a})`;
}
function spectrumAt(idx, count, a, light){
  const h=(gT*35 + (idx/count)*360)%360;
  return `hsla(${h},95%,${light==null?65:light}%,${a==null?1:a})`;
}

function circ(x,y,r,s,f,lw){ if(r<=0)return; ctx.beginPath(); ctx.arc(x,y,r,0,TAU); if(f){ctx.fillStyle=f;ctx.fill();} if(s){ctx.strokeStyle=s;ctx.lineWidth=lw||1;ctx.stroke();} }
function ln(x1,y1,x2,y2,c,lw){ ctx.strokeStyle=c;ctx.lineWidth=lw||1;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke(); }
function poly(px,py,r,n,rot,c,lw){ if(r<=0)return; ctx.strokeStyle=c;ctx.lineWidth=lw||1;ctx.beginPath(); for(let i=0;i<=n;i++){const a=rot+(i/n)*TAU;i?ctx.lineTo(px+Math.cos(a)*r,py+Math.sin(a)*r):ctx.moveTo(px+Math.cos(a)*r,py+Math.sin(a)*r);} ctx.stroke(); }
function glow(x,y,r,c){ if(r<=0)return; const g=ctx.createRadialGradient(x,y,0,x,y,r);g.addColorStop(0,c);g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r,0,TAU);ctx.fill(); }
function flowerCenters(px,py,r){ const c=[{x:px,y:py}]; for(let i=0;i<6;i++){const a=(i/6)*TAU;c.push({x:px+Math.cos(a)*r,y:py+Math.sin(a)*r});} return c; }

// stub -- annotation is now HTML, not canvas
function drawAnnotation(){ }





const scenes=[

{title:'Symmetry Breaking',sub:'13.8 billion years ago · the first difference',
draw(t){
  bg(0);
  if(t<1){ const a=clamp(0,1,t*2); glow(cx,cy,a*80,`hsla(${(gT*40+200)%360},92%,66%,${a*.9})`); return; }
  const boom=ease(clamp(0,1,(t-1)/3));
  const R=Math.min(W,H);
  // Nested triangles , Sri Yantra expansion
  for(let i=0;i<10;i++){
    const r=boom*R*(.03+i*.04);
    const alpha=(1-i/12)*boom*.5;
    poly(cx,cy,r,3,-Math.PI/2+t*.015,spectrumAt(i,10,alpha*1.6,68),1.6);
    poly(cx,cy,r,3,Math.PI/6+t*.015,spectrumAt(i+5,10,alpha*1.3,72),1);
  }
  // Expanding rings
  for(let i=1;i<=7;i++){
    const r=boom*R*.055*i;
    circ(cx,cy,r,`hsla(${(gT*40+200)%360},92%,66%,${(1-i/9)*boom*.28})`,'',0.5);
  }
  glow(cx,cy,60+boom*30,`hsla(${(gT*40+200)%360},92%,66%,${(1-boom*.65)*.85})`);
}},

{title:'The First Particles',sub:'matter condenses from energy · the first constraints appear',
draw(t){
  bg(1);
  const R=Math.min(W,H);
  const a=clamp(0,1,t/3);
  const r=R*.33*.38;
  // Flower of Life , sacred geometry of matter
  const fc=flowerCenters(cx,cy,r*2);
  circ(cx,cy,r*4,`hsla(${(gT*40+140)%360},92%,66%,${a*.2})`,'',0.5);
  circ(cx,cy,r*2,`hsla(${(gT*40+200)%360},92%,66%,${a*.3})`,'',0.5);
  fc.forEach((c,i)=>{
    const ia=clamp(0,1,(t-i*.12)/2);
    circ(c.x,c.y,r*2,`hsla(${(gT*40+140)%360},92%,66%,${ia*.28})`,'',0.7);
    circ(c.x,c.y,4+2*Math.sin(t*1.5+i),'',`hsla(${(gT*40+200)%360},92%,66%,${ia*.85})`);
  });
  // Metatron connecting lines
  for(let i=1;i<fc.length;i++)for(let j=i+1;j<fc.length;j++){
    const la=clamp(0,1,(t-1.5)/2)*.12;
    ln(fc[i].x,fc[i].y,fc[j].x,fc[j].y,`hsla(${(gT*40+140)%360},92%,66%,${la})`);
  }
  const p=.7+.3*Math.sin(t*2);
  glow(cx,cy,28*p,`hsla(${(gT*40+200)%360},92%,66%,${a*.5})`);
}},

{title:'The First Stars',sub:'hydrogen ignites · the first dissipative structures burn',
draw(t){
  bg(2);
  const R=Math.min(W,H);
  // Star field
  for(let i=0;i<160;i++){
    circ(((i*137.5)%1)*W,((i*97.3)%1)*H,.3+((i*3.7)%1)*.7,'',`hsla(${(gT*40+200)%360},92%,66%,${.15+((i*7.1)%1)*.3})`);
  }
  const ig=clamp(0,1,t/2.5);
  // 12-pointed star geometry
  for(let i=0;i<12;i++){
    const angle=(i/12)*TAU+t*.04;
    const len=ig*R*.32*(0.4+.6*Math.abs(Math.sin(i*1.7)));
    ln(cx,cy,cx+Math.cos(angle)*len,cy+Math.sin(angle)*len,`hsla(${(gT*40+200)%360},92%,66%,${ig*.38*(0.5+.5*Math.sin(i*1.3+t))})`,1);
  }
  // Energy shells
  for(let i=1;i<=5;i++){
    circ(cx,cy,ig*i*R*.065,`hsla(${(gT*40+200)%360},92%,66%,${180+i*12},${60+i*10},${ig*(1-i/6)*.42})`,'',1);
  }
  glow(cx,cy,18+ig*48,`hsla(${(gT*40+200)%360},92%,66%,${ig*.85})`);
  glow(cx,cy,55+ig*75,`hsla(${(gT*40+200)%360},92%,66%,${ig*.32})`);
  // Entropy export
  if(t>3){ const ea=fi(t,3,1.5);
    for(let i=0;i<8;i++){const a=(i/8)*TAU;ln(cx+Math.cos(a)*R*.14,cy+Math.sin(a)*R*.14,cx+Math.cos(a)*R*.29,cy+Math.sin(a)*R*.29,`hsla(${(gT*40+200)%360},92%,66%,${ea*.22})`,0.7);}
  }
}},

{title:'Supernova',sub:'death as the condition for greater complexity · elements scatter',
draw(t){
  bg(3);
  const R=Math.min(W,H);

  // Seed the sparkle field once using stable pseudo-random values
  const NUM_SPARKS=320;
  const sparks=[];
  for(let i=0;i<NUM_SPARKS;i++){
    const seed=i*137.508; // golden angle seed , stable
    const angle=seed;
    const speed=0.06+((i*7.3)%1)*0.22;
    const dist=speed*(R*.52);
    const size=0.8+((i*3.1)%1)*3.2;
    const hue=((i*11.7)%1)*360; // full rainbow scatter
    const brightness=60+((i*5.3)%1)*40;
    const twinklePhase=((i*9.1)%1)*TAU;
    sparks.push({angle,speed,dist,size,hue,brightness,twinklePhase});
  }

  // Phase 1: pre-explosion glow (t < 0.8)
  if(t<0.8){
    const preGlow=clamp(0,1,t/0.8);
    glow(cx,cy,12+preGlow*35,`hsla(${(gT*40+200)%360},92%,66%,${preGlow*0.9})`);
    glow(cx,cy,30+preGlow*60,`hsla(${(gT*40+200)%360},92%,66%,${preGlow*0.5})`);
    return;
  }

  const ex=clamp(0,1,(t-0.8)/2.2); // explosion progress 0-1
  const exE=ease(ex);

  // Shockwave rings , expanding outward fast then fading
  for(let ring=0;ring<4;ring++){
    const ringDelay=ring*0.18;
    const rp=clamp(0,1,(ex-ringDelay)/(1-ringDelay));
    const rr=rp*R*(0.12+ring*0.1);
    const alpha=(1-rp)*(0.7-ring*0.12);
    if(alpha>0){
      ctx.strokeStyle=`hsla(${(gT*40+200)%360},92%,66%,${140+ring*22},${40+ring*15},${alpha})`;
      ctx.lineWidth=3-ring*0.5;
      ctx.beginPath(); ctx.arc(cx,cy,rr,0,TAU); ctx.stroke();
    }
  }

  // Central flash , bright then fading
  const flashA=Math.max(0,0.9-ex*1.1);
  if(flashA>0){
    glow(cx,cy,15+exE*45,`hsla(${(gT*40+200)%360},92%,66%,${flashA})`);
    glow(cx,cy,40+exE*80,`hsla(${(gT*40+200)%360},92%,66%,${flashA*0.5})`);
  }

  // Scattered sparkles flying outward
  sparks.forEach((sp,i)=>{
    const travelProgress=clamp(0,1,(ex-i/NUM_SPARKS*0.4)/0.8);
    if(travelProgress<=0) return;

    const currentDist=travelProgress*sp.dist;
    const x=cx+Math.cos(sp.angle)*currentDist;
    const y=cy+Math.sin(sp.angle)*currentDist;

    // Twinkle , sparkles shimmer as they travel
    const twinkle=0.5+0.5*Math.sin(t*4+sp.twinklePhase);
    const alpha=twinkle*(1-travelProgress*0.4)*0.85;
    const r=sp.size*(0.6+twinkle*0.4);

    // Core sparkle , clamp radius to prevent negative value errors
    const safeR=Math.max(0.01,r);
    circ(x,y,safeR,'',`hsla(${sp.hue},90%,${sp.brightness}%,${alpha})`);

    // Cross-shaped sparkle glint for the brightest ones
    if(sp.size>2.5 && twinkle>0.7){
      const glintLen=safeR*3;
      const ga=alpha*0.5;
      ln(x-glintLen,y,x+glintLen,y,`hsla(${sp.hue},80%,95%,${ga})`,0.6);
      ln(x,y-glintLen,x,y+glintLen,`hsla(${sp.hue},80%,95%,${ga})`,0.6);
    }
  });

  // Remnant sparkle cloud , lingering glow at center
  if(ex>0.5){
    const remnantA=clamp(0,0.4,(ex-0.5)*0.8);
    glow(cx,cy,18+ex*12,`hsla(${(gT*40+200)%360},92%,66%,${remnantA})`);
  }

  // Some sparkles stop and become permanent distant stars
  if(ex>0.7){
    const starA=clamp(0,1,(ex-0.7)/0.5);
    for(let i=0;i<60;i++){
      const sp=sparks[i*5%NUM_SPARKS];
      const x=cx+Math.cos(sp.angle)*sp.dist*0.95;
      const y=cy+Math.sin(sp.angle)*sp.dist*0.95;
      const twinkle=0.4+0.6*Math.sin(t*2.5+sp.twinklePhase);
      circ(x,y,Math.max(0.01,sp.size*0.4*twinkle),'',`hsla(${sp.hue},70%,85%,${starA*twinkle*0.7})`);
    }
  }
}},

{title:'Planetary Chemistry',sub:'constraints tighten · molecular complexity emerges',
draw(t){
  bg(4);
  const R=Math.min(W,H);
  const a=clamp(0,1,t/2);
  const pR=R*.18;
  glow(cx,cy,pR*1.3,`hsla(${(gT*40+200)%360},92%,66%,${a*.68})`);
  circ(cx,cy,pR,`hsla(${(gT*40+200)%360},92%,66%,${a*.55})`,'',2);
  // Orbital rings
  for(let i=1;i<=3;i++) circ(cx,cy,pR*(1.4+i*.32),`hsla(${(gT*40+200)%360},92%,66%,${a*.13*(1-i/4)})`,'',0.5);
  // Vesica Piscis molecules orbiting
  if(a>.25){ const va=fi(t,1,2);
    const vR=R*.07, vO=vR*.82;
    for(let i=0;i<6;i++){
      const ang=(i/6)*TAU+t*.24;
      const oR=pR*(1.62+i*.18);
      const ox=cx+Math.cos(ang)*oR, oy=cy+Math.sin(ang)*oR;
      circ(ox-vO*.5,oy,vR,`hsla(${(gT*40+140)%360},92%,66%,${va*.45})`,'',0.8);
      circ(ox+vO*.5,oy,vR,`hsla(${(gT*40+140)%360},92%,66%,${va*.45})`,'',0.8);
      circ(ox,oy,2.5,'',`hsla(${(gT*40+90)%360},92%,66%,${va*.9})`);
    }
  }
}},

{title:'Self-Replicating Molecules',sub:'information enters the universe · the prior is born',
draw(t){
  bg(5);
  const R=Math.min(W,H);
  const hH=H*.68, hY=cy-hH/2, turns=4, amp=R*.086, steps=200;
  // Rungs
  for(let i=0;i<=steps;i+=8){
    const frac=i/steps, y=hY+frac*hH, a=frac*turns*TAU+t*.4;
    ln(cx+Math.cos(a)*amp,y,cx+Math.cos(a+Math.PI)*amp,y,`hsla(${(gT*40+140)%360},92%,66%,${.18+.08*Math.sin(a)})`,0.8);
  }
  // Strand 1
  ctx.strokeStyle=`hsla(${(gT*40+140)%360},92%,66%,.75)`; ctx.lineWidth=2; ctx.beginPath();
  for(let i=0;i<=steps;i++){const frac=i/steps,y=hY+frac*hH,a=frac*turns*TAU+t*.4,x=cx+Math.cos(a)*amp;i?ctx.lineTo(x,y):ctx.moveTo(x,y);} ctx.stroke();
  // Strand 2
  ctx.strokeStyle=`hsla(${(gT*40+30)%360},92%,66%,.75)`; ctx.lineWidth=2; ctx.beginPath();
  for(let i=0;i<=steps;i++){const frac=i/steps,y=hY+frac*hH,a=frac*turns*TAU+t*.4+Math.PI,x=cx+Math.cos(a)*amp;i?ctx.lineTo(x,y):ctx.moveTo(x,y);} ctx.stroke();
  // Replication fork
  if(t>2.5){ const ff=clamp(0,1,(t-2.5)/2);
    const fy=hY+ff*hH*.55;
    ln(cx-amp*2.2,fy,cx-amp*.5,fy+H*.06,`hsla(${(gT*40+200)%360},92%,66%,${ff*.45})`,0.8);
    ln(cx+amp*2.2,fy,cx+amp*.5,fy+H*.06,`hsla(${(gT*40+200)%360},92%,66%,${ff*.45})`,0.8);
    ln(cx-amp*2.2,fy,cx+amp*2.2,fy,`hsla(${(gT*40+200)%360},92%,66%,${ff*.28})`,0.5);
  }
}},

{title:'The First Cells',sub:'a boundary forms · interior and exterior · the first self',
draw(t){
  bg(6);
  const R=Math.min(W,H);
  const cR=R*.112;
  const hexPos=[
    {x:cx,y:cy},{x:cx+cR*1.73,y:cy-cR},{x:cx+cR*1.73,y:cy+cR},
    {x:cx,y:cy+cR*2},{x:cx-cR*1.73,y:cy+cR},{x:cx-cR*1.73,y:cy-cR},{x:cx,y:cy-cR*2}
  ];
  hexPos.forEach((p,i)=>{
    const a=clamp(0,1,(t-i*.28)/1.5); if(a<=0) return;
    const pulse=.93+.07*Math.sin(t*1.2+i);
    // Hexagonal membrane
    poly(p.x,p.y,cR*.94,6,Math.PI/6,`hsla(${(gT*40+140)%360},92%,66%,${a*.52})`,1.2);
    // Cytoplasm glow
    glow(p.x,p.y,cR*.75,`hsla(${(gT*40+140)%360},92%,66%,${a*.38})`);
    // Nucleus
    const nR=cR*.2;
    glow(p.x,p.y,nR*pulse*3,`hsla(${(gT*40+120)%360},92%,66%,${a*.28})`);
    circ(p.x,p.y,nR*pulse,`hsla(${(gT*40+120)%360},92%,66%,${a*.58})`,'',0.8);
    // Pulse ring
    circ(p.x,p.y,cR*(.96+.04*Math.sin(t+i)),`hsla(${(gT*40+140)%360},92%,66%,${a*.14})`,'',4);
  });
}},

{title:'Nervous Systems',sub:'the world models itself · the first prediction',
draw(t){
  bg(7);
  const R=Math.min(W,H);
  const a=clamp(0,1,t/2);
  const sR=R*.038;
  glow(cx,cy,sR*3,`hsla(${(gT*40+225)%360},92%,66%,${a*.48})`);
  circ(cx,cy,sR,`hsla(${(gT*40+220)%360},92%,66%,${a*.8})`,'',1.5);

  // Axon , right
  if(a>.08){
    const aLen=R*.42;
    ctx.strokeStyle=`hsla(${(gT*40+220)%360},92%,66%,${a*.68})`; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(cx+sR,cy);
    ctx.bezierCurveTo(cx+aLen*.3,cy+R*.055,cx+aLen*.62,cy-R*.04,cx+aLen,cy); ctx.stroke();
    // Terminals
    for(let i=0;i<5;i++){
      const ex=cx+aLen+Math.cos((i/4)*Math.PI*.8-Math.PI*.4)*R*.07;
      const ey=cy+Math.sin((i/4)*Math.PI*.8-Math.PI*.4)*R*.07;
      const ba=fi(t,1+i*.18,.8);
      circ(ex,ey,2.5+2*Math.sin(t*2+i),'',`hsla(${(gT*40+140)%360},92%,66%,${ba*.8})`);
      ln(cx+aLen,cy,ex,ey,`hsla(${(gT*40+140)%360},92%,66%,${ba*.35})`,.8);
    }
  }

    const oR=fruitR*6;
    for(let i=0;i<6;i++){
      const a2=(i/6)*TAU+Math.PI/6;
      poly(geoCx+Math.cos(a2)*oR*.72,geoCy+Math.sin(a2)*oR*.72,oR*.38,3,
           a2+t*.008,`hsla(${(gT*40+275)%360},92%,66%,${outerA*.25})`,0.6);
    }
    // Outer containing circle
    circ(geoCx,geoCy,oR,`hsla(${(gT*40+275)%360},92%,66%,${outerA*.2})`,'',0.6);
    // 12-pointed star
    for(let i=0;i<12;i++){
      const a2=(i/12)*TAU+t*.005;
      ln(geoCx,geoCy,
         geoCx+Math.cos(a2)*oR,geoCy+Math.sin(a2)*oR,
         `hsla(${(gT*40+275)%360},92%,66%,${outerA*.1})`,0.4);
    }
  }

  // Rotating sacred overlay
  if(t>3.5){
    const rA=fi(t,3.5,2);
    ctx.save();
    ctx.translate(geoCx,geoCy);
    ctx.rotate(t*0.018);
    poly(0,0,fruitR*5.5,6,0,`hsla(${(gT*40+30)%360},92%,66%,${rA*.12})`,0.6);
    poly(0,0,fruitR*5.5,6,Math.PI/6,`hsla(${(gT*40+140)%360},92%,66%,${rA*.1})`,0.5);
    ctx.restore();
  }

  // Central glow , the living center
  glow(geoCx,geoCy,fruitR*1.8,`hsla(${(gT*40+130)%360},92%,66%,${a*.4})`);

}}

]; // end scenes

// State
let cur=0, sT=0, lastTS=0, started=false, ended=false;

function updateUI(){
  const s=scenes[cur];
  document.getElementById('ctr').textContent='Scene '+(cur+1)+' of '+scenes.length;
  document.getElementById('ttl').textContent=s.title;
  document.getElementById('sub').textContent=s.sub;
  document.getElementById('bar').style.width=((cur+1)/scenes.length*100)+'%';
}

function goTo(i){
  if(i>=scenes.length){ ended=true; document.getElementById('end').classList.add('show'); document.getElementById('ui').style.opacity='0'; return; }
  cur=clamp(0,scenes.length-1,i); sT=0;
  updateUI();
}

// Animation loop
requestAnimationFrame(function loop(ts){
  const dt=Math.min((ts-lastTS)/1000,.05); lastTS=ts;
  gT=ts/1000;
  if(started){
    sT+=dt; ctx.clearRect(0,0,W,H);
    try{ scenes[cur].draw(sT); }
    catch(e){
      ctx.fillStyle='rgb('+bgs[cur]+')'; ctx.fillRect(0,0,W,H);
      ctx.fillStyle='rgba(255,100,100,0.7)'; ctx.font='12px monospace'; ctx.textAlign='center';
      ctx.fillText('Scene '+(cur+1)+' error: '+(e.message||String(e)), cx, cy);
      console.error('Scene',cur,'error:',e);
    }
  }
  requestAnimationFrame(loop);
});

// Input
function advance(){
  if(!started){
    started=true;
    const intro=document.getElementById('intro');
    intro.style.opacity='0';
    intro.style.pointerEvents='none';
    setTimeout(()=>{ intro.style.display='none'; },1300);
    goTo(0);
    return;
  }
  if(!ended) goTo(cur+1);
}

document.addEventListener('click', advance);
document.addEventListener('keydown', e=>{
  if(['ArrowRight',' ','Enter'].includes(e.key)) advance();
  if(e.key==='ArrowLeft'&&started&&!ended) goTo(cur-1);
});
document.getElementById('rst').addEventListener('click', e=>{
  e.stopPropagation();
  ended=false; document.getElementById('end').classList.remove('show'); document.getElementById('ui').style.opacity='1'; goTo(0);
});

updateUI();
</script>
</body>
